# Accessly local stack. Copy .env.example to .env before running `docker compose up`.
name: accessly

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_strong_Passw0rd!}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RabbitMq__Username:-guest}
      RABBITMQ_DEFAULT_PASS: ${RabbitMq__Password:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=Accessly;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_Passw0rd!};TrustServerCertificate=True;Encrypt=False"
      Jwt__SigningKey: ${Jwt__SigningKey:-dev-only-change-me-please-use-a-long-random-string-32+chars}
      Redis__Connection: "redis:6379"
      Redis__Enabled: "true"
      RabbitMq__Enabled: "true"
      RabbitMq__Host: "rabbitmq"
      Seed__Enabled: "true"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=Accessly;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_Passw0rd!};TrustServerCertificate=True;Encrypt=False"
      RabbitMq__Enabled: "true"
      RabbitMq__Host: "rabbitmq"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  mssql-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
