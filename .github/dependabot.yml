version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # FluentAssertions 8+ ships under a commercial license; the project pins to the
      # last free 7.x line on purpose (see docs/adr). Skip major-version bumps.
      - dependency-name: "FluentAssertions"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/src/Accessly.Web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/infra/docker"
    schedule:
      interval: weekly
