name: Docs

on:
  push:
    branches: [main]
    paths: ['**/*.md']
  pull_request:
    paths: ['**/*.md']

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            *.md
            docs/**/*.md
