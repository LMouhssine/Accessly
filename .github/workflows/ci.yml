name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore Accessly.slnx
      - name: Build
        run: dotnet build Accessly.slnx --configuration Release --no-restore
      - name: Test (unit, architecture, integration)
        run: dotnet test Accessly.slnx --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Accessly.Web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Accessly.Web/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test -- --watch=false
      - name: Build
        run: npm run build

  docker:
    name: Container images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build API image
        run: docker build -f infra/docker/api.Dockerfile -t accessly-api:ci .
      - name: Build Web image
        run: docker build -f infra/docker/web.Dockerfile -t accessly-web:ci .
